<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Resume</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>John Doe</h1>
            <p>Full Stack Developer | john@example.com</p>
        </header>
        <section>
            <h2>Experience</h2>
            <div class="job">
                <h3>Senior Developer at TechCorp</h3>
                <p>2020 - Present</p>
                <ul><li>Developed high scale applications.</li></ul>
            </div>
        </section>
        <section>
            <h2>Education</h2>
            <p>BSc in Computer Science, University of Technology</p>
        </section>
    </div>
</body>
</html>
